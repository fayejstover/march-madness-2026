<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness Bracket Simulator — 2026</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="container">
    <div class="hdr-inner">
      <div class="hdr-brand">
        <div class="hdr-icon">🏀</div>
        <div>
          <div class="hdr-title">Bracket Simulator</div>
          <div class="hdr-sub">2026</div>
        </div>
      </div>
      <div class="hdr-links">
        <a class="hdr-link" href="https://github.com/fayejstover" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main class="container">
  <div class="main-layout">

    <!-- ── Left column: bracket ──────────────────────────────────────────── -->
    <div>
      <div class="panel" style="margin-bottom:1.25rem">

        <!-- Round tabs -->
        <div id="round-tabs"></div>

        <!-- Back / round title / Next -->
        <div id="round-nav"></div>

        <!-- Hint -->
        <div class="edit-hint">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 1l4 4L5 15H1v-4L11 1z"/></svg>
          Click a team row to pick them. Click again to unselect. Click the team name to edit their stats.
        </div>

        <!-- Pick legend -->
        <div id="pick-legend"></div>

        <!-- Matchup cards -->
        <div style="padding:1rem" id="matchups"></div>

        <!-- Reset picks -->
        <div style="padding:0 1rem .9rem">
          <button class="reset-picks-btn" onclick="App.resetAllPicks()">↺ Reset all picks to algorithm</button>
        </div>

      </div><!-- /panel -->

    </div><!-- /left col -->

    <!-- ── Right sidebar ─────────────────────────────────────────────────── -->
    <div>

      <!-- Weight bars -->
      <div class="panel" style="margin-bottom:1rem">
        <div class="panel-hdr"><span class="panel-title">Active Round Weights</span></div>
        <div class="panel-body"><div id="weight-bars"></div></div>
      </div>

      <!-- Champion projection -->
      <div class="panel">
        <div class="panel-hdr"><span class="panel-title">Projected Champion</span></div>
        <div class="panel-body" id="champion-panel"></div>
      </div>

    </div><!-- /sidebar -->

  </div><!-- /main-layout -->
</main>

<!-- ── Footer ───────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="container">
    2026 March Madness Bracket Simulator. Just for fun.
    <a href="https://github.com/your-username/bracket-simulator" target="_blank" rel="noopener"></a>
  </div>
</footer>

<!-- ── Modal roots ───────────────────────────────────────────────────────────── -->
<div id="modal-root"></div>
<div id="bracket-view-root"></div>

<!-- ── Scripts (dependency order) ───────────────────────────────────────────── -->
<script src="js/data.js"></script>
<script src="js/bounds.js"></script>
<script src="js/engine.js"></script>
<script src="js/bracket-view.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
